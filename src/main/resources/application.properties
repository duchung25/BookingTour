spring.config.import=optional:file:./config/ConfigApplication.properties

spring.application.name=project

app.dev-auto-login.enabled=false

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/tourbookingdb
spring.datasource.username=root
spring.datasource.password=root@123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-init.sql

spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

gemini.model=gemini-2.5-flash

spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

server.ssl.enabled=false
server.ssl.certificate=classpath:ssl/tourbooking.local.crt
server.ssl.certificate-private-key=classpath:ssl/tourbooking.local.key

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/tours