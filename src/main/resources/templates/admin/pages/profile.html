<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Hồ sơ Admin', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Hồ sơ')}"></div>
        <h4 class="fw-bold mb-4">📋 Hồ Sơ Quản Trị Viên</h4>

        <!-- Thông báo thành công -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">
            <!-- Cột trái: Thông tin tổng quan -->
            <div class="col-md-4">
                <div class="card admin-card text-center p-4">
                    <!-- Avatar -->
                    <div th:if="${user.avatarUrl != null && !user.avatarUrl.isEmpty()}" class="mx-auto mb-3">
                        <img th:src="${user.avatarUrl}" alt="Avatar"
                             style="width:80px;height:80px;border-radius:50%;object-fit:cover;">
                    </div>
                    <div th:unless="${user.avatarUrl != null && !user.avatarUrl.isEmpty()}"
                         class="mx-auto mb-3"
                         style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#1a1a2e,#0f3460);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;font-weight:700;">
                        <span th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'A'}"></span>
                    </div>

                    <h5 class="fw-bold" th:text="${user.fullName}">Admin</h5>
                    <p class="text-muted small" th:text="${user.email}">admin@traveler.vn</p>
                    <span class="badge bg-primary rounded-pill" th:text="${user.role.name}">ADMIN</span>
                </div>
            </div>

            <!-- Cột phải: Form cập nhật -->
            <div class="col-md-8">
                <div class="card admin-card">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Cập nhật thông tin</h5>

                        <!-- Lỗi -->
                        <div th:if="${profileError}" class="alert alert-danger" role="alert">
                            <span th:text="${profileError}"></span>
                        </div>

                        <form th:action="@{/admin/profile/update}" th:object="${updateProfileRequest}" method="post">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Họ tên <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{fullName}"
                                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" class="form-control" th:value="${user.email}" readonly
                                           style="background-color: #f8f9fa;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Số điện thoại</label>
                                    <input type="tel" class="form-control" th:field="*{phone}"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Vai trò</label>
                                    <input type="text" class="form-control" th:value="${user.role.name}" readonly
                                           style="background-color: #f8f9fa;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Giới tính</label>
                                    <select class="form-select" th:field="*{gender}">
                                        <option value="">-- Chọn --</option>
                                        <option value="Nam">Nam</option>
                                        <option value="Nữ">Nữ</option>
                                        <option value="Khác">Khác</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Ngày sinh</label>
                                    <input type="date" class="form-control" th:field="*{dateOfBirth}">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Địa chỉ</label>
                                    <input type="text" class="form-control" th:field="*{address}"
                                           th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
