<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Quản lý Điểm đến', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Điểm đến')}"></div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">📍 Quản lý điểm đến</h4>
            <a th:href="@{/admin/destinations/create}" class="btn btn-primary">+ Thêm điểm đến</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card admin-card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/destinations}" method="get">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-3">
                            <select name="status" class="form-select form-select-sm">
                                <option value="">Tất cả trạng thái</option>
                                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Đang hoạt động</option>
                                <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Ngưng hoạt động</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm w-100">Lọc</button>
                        </div>
                        <div class="col-md-2">
                            <a th:href="@{/admin/destinations}" class="btn btn-outline-secondary btn-sm w-100">Đặt lại</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card admin-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-admin table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Ảnh</th>
                                <th>Tên</th>
                                <th>Tỉnh / Quốc gia</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${destinationPage.content.isEmpty()}">
                                <td colspan="5" class="text-center text-muted py-4">Không tìm thấy điểm đến nào.</td>
                            </tr>
                            <tr th:each="d : ${destinationPage.content}">
                                <td>
                                    <img th:if="${d.imageUrl != null && !d.imageUrl.isEmpty()}"
                                         th:src="${d.imageUrl}" alt="Ảnh"
                                         style="width:64px;height:48px;object-fit:cover;border-radius:6px"/>
                                    <span th:unless="${d.imageUrl != null && !d.imageUrl.isEmpty()}"
                                          class="text-muted small">—</span>
                                </td>
                                <td>
                                    <strong th:text="${d.name}">Tên</strong>
                                    <div class="small text-muted text-truncate" style="max-width:280px" th:text="${d.description}">Mô tả</div>
                                </td>
                                <td>
                                    <span th:text="${d.province}">Tỉnh</span>
                                    <div class="small text-muted" th:text="${d.country}">Quốc gia</div>
                                </td>
                                <td>
                                    <span th:if="${d.status == 'ACTIVE'}" class="badge bg-success rounded-pill">Đang hoạt động</span>
                                    <span th:if="${d.status == 'INACTIVE'}" class="badge bg-secondary rounded-pill">Ngưng</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/destinations/update(id=${d.id})}" class="btn btn-outline-primary">Sửa</a>
                                        <a th:href="@{/admin/destinations/delete(id=${d.id})}" class="btn btn-outline-danger">Xóa</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <nav th:if="${destinationPage.totalPages > 1}" aria-label="Phân trang" class="mt-3">
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted small"
                      th:text="'Hiển thị ' + (${destinationPage.number * destinationPage.size + 1}) + '-' + (${destinationPage.number * destinationPage.size + destinationPage.numberOfElements}) + ' của ' + ${destinationPage.totalElements} + ' kết quả'">
                </span>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${destinationPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/destinations(status=${status}, page=${destinationPage.number - 1})}">←</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, destinationPage.totalPages - 1)}"
                        class="page-item" th:classappend="${i == destinationPage.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/destinations(status=${status}, page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${destinationPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/destinations(status=${status}, page=${destinationPage.number + 1})}">→</a>
                    </li>
                </ul>
            </div>
        </nav>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
