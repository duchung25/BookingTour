<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Quản lý Danh mục tour', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Danh mục tour')}"></div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">🏷️ Quản lý danh mục Tour</h4>
            <a th:href="@{/admin/categories/create}" class="btn btn-primary">+ Thêm danh mục</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card admin-card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/categories}" method="get">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-3">
                            <select name="status" class="form-select form-select-sm">
                                <option value="">Tất cả trạng thái</option>
                                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Đang hoạt động</option>
                                <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Ngưng hoạt động</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm w-100">Lọc</button>
                        </div>
                        <div class="col-md-2">
                            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary btn-sm w-100">Đặt lại</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card admin-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-admin table-hover mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên danh mục</th>
                                <th>Mô tả</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${categoryPage.content.isEmpty()}">
                                <td colspan="5" class="text-center text-muted py-4">Không tìm thấy danh mục nào.</td>
                            </tr>
                            <tr th:each="c : ${categoryPage.content}">
                                <td th:text="${c.id}">1</td>
                                <td><strong th:text="${c.name}">Tên</strong></td>
                                <td class="text-muted small" th:text="${c.description}">Mô tả</td>
                                <td>
                                    <span th:if="${c.status == 'ACTIVE'}" class="badge bg-success rounded-pill">Đang hoạt động</span>
                                    <span th:if="${c.status == 'INACTIVE'}" class="badge bg-secondary rounded-pill">Ngưng</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/categories/update(id=${c.id})}" class="btn btn-outline-primary">Sửa</a>
                                        <a th:href="@{/admin/categories/delete(id=${c.id})}" class="btn btn-outline-danger">Xóa</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <nav th:if="${categoryPage.totalPages > 1}" aria-label="Phân trang" class="mt-3">
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted small"
                      th:text="'Hiển thị ' + (${categoryPage.number * categoryPage.size + 1}) + '-' + (${categoryPage.number * categoryPage.size + categoryPage.numberOfElements}) + ' của ' + ${categoryPage.totalElements} + ' kết quả'">
                </span>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${categoryPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/categories(status=${status}, page=${categoryPage.number - 1})}">←</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, categoryPage.totalPages - 1)}"
                        class="page-item" th:classappend="${i == categoryPage.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/categories(status=${status}, page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${categoryPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/categories(status=${status}, page=${categoryPage.number + 1})}">→</a>
                    </li>
                </ul>
            </div>
        </nav>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
