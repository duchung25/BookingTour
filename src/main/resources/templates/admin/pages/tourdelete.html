<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Xóa tour', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Xóa tour')}"></div>
        <h4 class="fw-bold mb-4">🗑️ Xóa Tour</h4>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 p-5 text-center">
                    <div class="fs-1 mb-3">⚠️</div>
                    <h5 class="fw-bold">Xác nhận xóa tour?</h5>
                    <div class="card bg-light border-0 rounded-3 p-3 my-3 text-start small">
                        <div class="mb-1"><strong>Mã tour:</strong> <span th:text="${tour.code}">T001</span></div>
                        <div class="mb-1"><strong>Tên:</strong> <span th:text="${tour.name}">Tên tour</span></div>
                        <div class="mb-1"><strong>Điểm đến:</strong> <span th:text="${tour.destination.name}">Đà Nẵng</span></div>
                        <div class="mb-1"><strong>Thời gian:</strong> <span th:text="${tour.durationDays + 'N' + tour.durationNights + 'Đ'}">3N2Đ</span></div>
                        <div><strong>Trạng thái:</strong> <span th:text="${tour.status}">ACTIVE</span></div>
                    </div>
                    <div class="alert alert-warning small">
                        ⚠️ Tour sẽ được chuyển sang trạng thái <strong>DELETED</strong> (xóa mềm).
                        Nếu tour đang có đơn đặt PENDING/CONFIRMED, thao tác sẽ bị từ chối.
                    </div>
                    <form th:action="@{/admin/tours/delete(id=${tour.id})}" method="post">
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-danger px-4">Xác nhận xóa</button>
                            <a th:href="@{/admin/tours}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
