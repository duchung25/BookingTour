<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Xóa khuyến mãi', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Xóa khuyến mãi')}"></div>
        <h4 class="fw-bold mb-4">🗑️ Xóa Khuyến Mãi</h4>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 p-5 text-center">
                    <div class="fs-1 mb-3">⚠️</div>
                    <h5 class="fw-bold">Xác nhận xóa khuyến mãi?</h5>
                    <div class="card bg-light border-0 rounded-3 p-3 my-3 text-start small">
                        <div class="mb-1"><strong>Mã:</strong> <span th:text="${promotion.code}">CODE</span></div>
                        <div class="mb-1"><strong>Tên:</strong> <span th:text="${promotion.name}">Tên</span></div>
                        <div class="mb-1"><strong>Giảm giá:</strong>
                            <span th:if="${promotion.discountType == 'PERCENT'}" th:text="${promotion.discountValue + '%'}">10%</span>
                            <span th:if="${promotion.discountType == 'FIXED'}" th:text="${#numbers.formatDecimal(promotion.discountValue, 0, 'COMMA', 0, 'POINT') + 'đ'}">100.000đ</span>
                        </div>
                        <div class="mb-1"><strong>Đã dùng:</strong> <span th:text="${promotion.usedCount + ' lượt'}">0 lượt</span></div>
                        <div><strong>Trạng thái:</strong> <span th:text="${promotion.status}">ACTIVE</span></div>
                    </div>
                    <div class="alert alert-warning small">
                        ⚠️ Nếu khuyến mãi đang được dùng bởi đơn đặt PENDING/CONFIRMED, nó sẽ chuyển sang <strong>INACTIVE</strong> (xóa mềm).
                        Nếu không có đơn nào, khuyến mãi sẽ bị <strong>xóa vĩnh viễn</strong>.
                    </div>
                    <form th:action="@{/admin/promotions/delete(id=${promotion.id})}" method="post">
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-danger px-4">Xác nhận xóa</button>
                            <a th:href="@{/admin/promotions}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
