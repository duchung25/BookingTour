<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Quản lý Tour', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Tour du lịch')}"></div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">🗺️ Quản Lý Tour Du Lịch</h4>
            <a th:href="@{/admin/tours/create}" class="btn btn-primary">+ Thêm tour mới</a>
        </div>

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Search & Filter -->
        <div class="card admin-card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/tours}" method="get">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-4">
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control form-control-sm" placeholder="Tìm theo tên, mã tour...">
                        </div>
                        <div class="col-md-3">
                            <select name="status" class="form-select form-select-sm">
                                <option value="">Tất cả trạng thái</option>
                                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Đang mở</option>
                                <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Tạm ngưng</option>
                                <option value="DELETED" th:selected="${status == 'DELETED'}">Đã xóa</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm w-100">Tìm kiếm</button>
                        </div>
                        <div class="col-md-2">
                            <a th:href="@{/admin/tours}" class="btn btn-outline-secondary btn-sm w-100">Đặt lại</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card admin-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-admin table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Ảnh</th>
                                <th>Mã tour</th>
                                <th>Tên tour</th>
                                <th>Điểm đến</th>
                                <th>Thời gian</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${tourPage.content.isEmpty()}">
                                <td colspan="7" class="text-center text-muted py-4">Không tìm thấy tour nào.</td>
                            </tr>
                            <tr th:each="tour : ${tourPage.content}">
                                <td>
                                    <img th:if="${tour.images != null && !tour.images.isEmpty()}"
                                         th:src="${tour.images[0].imageUrl}" alt="Tour"
                                         style="width:60px; height:40px; object-fit:cover; border-radius:4px;">
                                    <span th:if="${tour.images == null || tour.images.isEmpty()}"
                                          class="text-muted small">—</span>
                                </td>
                                <td><strong th:text="${tour.code}">T001</strong></td>
                                <td th:text="${tour.name}">Tên tour</td>
                                <td th:text="${tour.destination.name}">Điểm đến</td>
                                <td th:text="${tour.durationDays + 'N' + tour.durationNights + 'Đ'}">3N2Đ</td>
                                <td>
                                    <span th:if="${tour.status == 'ACTIVE'}" class="badge bg-success rounded-pill">Đang mở</span>
                                    <span th:if="${tour.status == 'INACTIVE'}" class="badge bg-warning text-dark rounded-pill">Tạm ngưng</span>
                                    <span th:if="${tour.status == 'DELETED'}" class="badge bg-secondary rounded-pill">Đã xóa</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/tours/departures(tourId=${tour.id})}" class="btn btn-outline-info" title="Lịch khởi hành">📅</a>
                                        <a th:href="@{/admin/tours/update(id=${tour.id})}" class="btn btn-outline-primary">Sửa</a>
                                        <a th:if="${tour.status != 'DELETED'}"
                                           th:href="@{/admin/tours/delete(id=${tour.id})}" class="btn btn-outline-danger">Xóa</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${tourPage.totalPages > 1}" aria-label="Phân trang" class="mt-3">
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted small"
                      th:text="'Hiển thị ' + (${tourPage.number * tourPage.size + 1}) + '-' + (${tourPage.number * tourPage.size + tourPage.numberOfElements}) + ' của ' + ${tourPage.totalElements} + ' kết quả'">
                </span>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${tourPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/tours(keyword=${keyword}, status=${status}, page=${tourPage.number - 1})}">←</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, tourPage.totalPages - 1)}"
                        class="page-item" th:classappend="${i == tourPage.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/tours(keyword=${keyword}, status=${status}, page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${tourPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/tours(keyword=${keyword}, status=${status}, page=${tourPage.number + 1})}">→</a>
                    </li>
                </ul>
            </div>
        </nav>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
