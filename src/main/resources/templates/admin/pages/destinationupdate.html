<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Cập nhật điểm đến', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Cập nhật điểm đến')}"></div>
        <h4 class="fw-bold mb-4">📍 Cập Nhật Điểm Đến</h4>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card admin-card">
            <div class="card-body p-4">
                <form th:action="@{/admin/destinations/update(id=${destination.id})}" method="post" th:object="${destinationRequest}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Tên điểm đến <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}">
                            <div th:if="${#fields.hasErrors('name')}" class="text-danger small" th:errors="*{name}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Tỉnh/Thành</label>
                            <input type="text" class="form-control" th:field="*{province}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Quốc gia <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{country}">
                            <div th:if="${#fields.hasErrors('country')}" class="text-danger small" th:errors="*{country}"></div>
                        </div>
                        <div class="col-md-9">
                            <label class="form-label fw-semibold">Ảnh đại diện (URL)</label>
                            <input type="text" class="form-control" th:field="*{imageUrl}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="ACTIVE">Đang hoạt động</option>
                                <option value="INACTIVE">Ngưng hoạt động</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                        <a th:href="@{/admin/destinations}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
