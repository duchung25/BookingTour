<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Thêm danh mục tour', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Thêm danh mục')}"></div>
        <h4 class="fw-bold mb-4">🏷️ Thêm Danh Mục Tour Mới</h4>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card admin-card">
            <div class="card-body p-4">
                <form th:action="@{/admin/categories/create}" method="post" th:object="${categoryRequest}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Tên danh mục <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="VD: Du lịch biển">
                            <div th:if="${#fields.hasErrors('name')}" class="text-danger small" th:errors="*{name}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="ACTIVE">Đang hoạt động</option>
                                <option value="INACTIVE">Ngưng hoạt động</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea class="form-control" rows="3" th:field="*{description}" placeholder="Mô tả ngắn về danh mục..."></textarea>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Tạo danh mục</button>
                        <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
