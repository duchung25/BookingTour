<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Xóa đơn đặt', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Xóa đơn đặt')}"></div>
        <h4 class="fw-bold mb-4">🗑️ Xóa Đơn Đặt Tour</h4>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4 p-5 text-center">
                    <div class="fs-1 mb-3">⚠️</div>
                    <h5 class="fw-bold">Xác nhận xóa đơn đặt tour?</h5>
                    <div class="card bg-light border-0 rounded-3 p-3 my-3 text-start small">
                        <div class="mb-1"><strong>Mã đơn:</strong> <span th:text="'#' + ${booking.bookingCode}">#BK001</span></div>
                        <div class="mb-1"><strong>Khách hàng:</strong> <span th:text="${booking.contactName}">Tên</span></div>
                        <div class="mb-1"><strong>Tour:</strong> <span th:text="${booking.tourDeparture.tour.name}">Tour</span></div>
                        <div class="mb-1"><strong>Tổng tiền:</strong> <span th:text="${#numbers.formatDecimal(booking.finalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</span></div>
                        <div><strong>Trạng thái:</strong>
                            <span th:if="${booking.bookingStatus == 'CANCELLED'}" class="badge bg-danger">Đã hủy</span>
                            <span th:if="${booking.bookingStatus != 'CANCELLED'}" class="badge bg-warning text-dark" th:text="${booking.bookingStatus}">Status</span>
                        </div>
                    </div>
                    <div class="alert alert-warning small">
                        ⚠️ Đơn đặt sẽ được chuyển sang trạng thái <strong>DELETED</strong> (xóa mềm).
                        Chỉ đơn đã <strong>HỦY</strong> mới có thể xóa.
                    </div>
                    <form th:action="@{/admin/bookings/delete(id=${booking.id})}" method="post">
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-danger px-4">Xác nhận xóa</button>
                            <a th:href="@{/admin/bookings}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
