<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{admin/fragments/head :: head('Danh sách nhân viên', null)}"></head>
<body>
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{admin/fragments/header :: header}"></div>
    <main class="flex-grow-1 p-4">
        <div th:replace="~{admin/fragments/breadcrumb :: breadcrumb('Nhân viên')}"></div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">👔 Danh Sách Nhân Viên</h4>
            <a th:href="@{/admin/staff/create}" class="btn btn-primary">+ Thêm nhân viên</a>
        </div>

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Search -->
        <div class="card admin-card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/staff}" method="get">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-5">
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control form-control-sm"
                                   placeholder="Tìm theo tên, email, SĐT...">
                        </div>
                        <div class="col-md-3">
                            <select name="status" class="form-select form-select-sm">
                                <option value="">Tất cả trạng thái</option>
                                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Đang làm</option>
                                <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Đã nghỉ</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm w-100">Tìm kiếm</button>
                        </div>
                        <div class="col-md-2">
                            <a th:href="@{/admin/staff}" class="btn btn-outline-secondary btn-sm w-100">Đặt lại</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table -->
        <div class="card admin-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-admin table-hover mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>Điện thoại</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Nếu không có dữ liệu -->
                            <tr th:if="${staffPage.content.isEmpty()}">
                                <td colspan="6" class="text-center text-muted py-4">Không tìm thấy nhân viên nào.</td>
                            </tr>
                            <!-- Dữ liệu từ DB -->
                            <tr th:each="staff, iter : ${staffPage.content}">
                                <td th:text="${staffPage.number * staffPage.size + iter.count}">1</td>
                                <td class="fw-semibold" th:text="${staff.fullName}">Tên</td>
                                <td th:text="${staff.email}">email@example.com</td>
                                <td th:text="${staff.phone ?: '—'}">0900000000</td>
                                <td>
                                    <span th:if="${staff.status == 'ACTIVE'}" class="badge bg-success rounded-pill">Đang làm</span>
                                    <span th:if="${staff.status == 'INACTIVE'}" class="badge bg-secondary rounded-pill">Đã nghỉ</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/staff/update(id=${staff.id})}" class="btn btn-outline-primary">Sửa</a>
                                        <a th:if="${staff.id != currentUserId}"
                                           th:href="@{/admin/staff/delete(id=${staff.id})}"
                                           class="btn btn-outline-danger">Nghỉ việc</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${staffPage.totalPages > 1}" aria-label="Phân trang" class="mt-3">
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted small"
                      th:text="'Hiển thị ' + (${staffPage.number * staffPage.size + 1}) + '-' + (${staffPage.number * staffPage.size + staffPage.numberOfElements}) + ' của ' + ${staffPage.totalElements} + ' kết quả'">
                </span>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${staffPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/staff(keyword=${keyword}, status=${status}, page=${staffPage.number - 1})}">←</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, staffPage.totalPages - 1)}"
                        class="page-item" th:classappend="${i == staffPage.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/staff(keyword=${keyword}, status=${status}, page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${staffPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/staff(keyword=${keyword}, status=${status}, page=${staffPage.number + 1})}">→</a>
                    </li>
                </ul>
            </div>
        </nav>
    </main>
    <div th:replace="~{admin/fragments/footer :: footer}"></div>
</div>
</body>
</html>
