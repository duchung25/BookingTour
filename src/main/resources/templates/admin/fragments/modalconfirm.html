<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="modalconfirm(modalId, title, message, action)" class="modal fade" th:id="${modalId}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" th:text="${title}">Xác nhận</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-4">
                <div class="text-center">
                    <div class="fs-1 mb-3">⚠️</div>
                    <p class="mb-0" th:text="${message}">Bạn có chắc chắn muốn thực hiện hành động này?</p>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy bỏ</button>
                <a th:href="${action}" class="btn btn-danger">Xác nhận xóa</a>
            </div>
        </div>
    </div>
</div>
</html>
