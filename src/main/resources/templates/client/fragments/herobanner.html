<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<section th:fragment="herobanner" class="hero-luxe">
    <!-- Decorative floating shapes -->
    <div class="hero-deco hero-deco-1"></div>
    <div class="hero-deco hero-deco-2"></div>

    <div class="container position-relative py-5" style="z-index:2;">
        <div class="row align-items-center">
            <div class="col-lg-7 py-5">
                <div class="hero-badge mb-3 reveal"><i class="fa-solid fa-ranking-star"></i> Nền tảng du lịch số 1 Việt Nam</div>
                <h1 class="hero-title mb-3 reveal reveal-delay-1">
                    Khám phá<br>
                    <span class="text-accent">Việt Nam</span> tuyệt đẹp
                </h1>
                <p class="hero-subtitle mb-4 reveal reveal-delay-2">
                    Hàng nghìn tour du lịch trong nước và quốc tế — Đặt nhanh, giá tốt, dịch vụ 5 sao. Mỗi chuyến đi là một hành trình đáng nhớ.
                </p>
                <div class="d-flex gap-3 mb-5 reveal reveal-delay-3">
                    <a th:href="@{/tours}" class="btn btn-primary-luxe btn-lg px-4">Khám phá tour <i class="fa-solid fa-arrow-right-long"></i></a>
                    <a th:href="@{/about}" class="btn btn-outline-luxe btn-lg px-4">Tìm hiểu thêm</a>
                </div>
                <div class="row g-3 reveal reveal-delay-4">
                    <div class="col-3">
                        <div class="hero-stat-card">
                            <div class="hero-stat-value" data-count="1200" data-suffix="+">0</div>
                            <div class="hero-stat-label">Tour đa dạng</div>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="hero-stat-card">
                            <div class="hero-stat-value" data-count="500" data-suffix="K+">0</div>
                            <div class="hero-stat-label">Khách hài lòng</div>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="hero-stat-card">
                            <div class="hero-stat-value" data-count="50" data-suffix="+">0</div>
                            <div class="hero-stat-label">Điểm đến</div>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="hero-stat-card">
                            <div class="hero-stat-value" data-count="15" data-suffix="">0</div>
                            <div class="hero-stat-label">Năm kinh nghiệm</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
