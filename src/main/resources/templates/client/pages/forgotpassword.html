<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{client/fragments/head :: head('Quên mật khẩu', null)}"></head>
<body>
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold"><span class="text-primary">✈️ Travel</span><span class="text-warning">er</span></h3>
                            <p class="text-muted">Lấy lại mật khẩu của bạn</p>
                        </div>
                        <div class="alert alert-info small">Nhập email đã đăng ký. Chúng tôi sẽ đặt lại mật khẩu tạm thời cho bạn.</div>
                        <div th:if="${errorMessage}" class="alert alert-danger small" th:text="${errorMessage}"></div>
                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-4"><label class="form-label fw-semibold">Email</label><input type="email" name="email" class="form-control form-control-lg" placeholder="Nhập email đã đăng ký" th:value="${email}" required></div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold">Đặt lại mật khẩu</button>
                        </form>
                        <hr class="my-4">
                        <p class="text-center mb-0 small"><a th:href="@{/login}" class="text-decoration-none fw-semibold">← Quay lại đăng nhập</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
