<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{client/fragments/head :: head('Đăng nhập', null)}"></head>
<body>
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold"><span class="navbar-brand-text"><span class="brand-primary">Tra</span><span class="brand-accent">veler</span></span></h3>
                            <p style="color:var(--color-text-muted);">Đăng nhập để đặt tour du lịch</p>
                        </div>

                        <!-- Thông báo lỗi đăng nhập -->
                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Thông báo đăng ký thành công -->
                        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${successMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Thông báo đăng xuất thành công -->
                        <div th:if="${logoutMessage}" class="alert alert-info alert-dismissible fade show" role="alert">
                            <span th:text="${logoutMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Form đăng nhập: PHẢI dùng name="" không phải th:field -->
                        <!-- th:action="@{/login}" để Thymeleaf tự thêm CSRF token -->
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" name="email" class="form-control form-control-lg" placeholder="Nhập email của bạn" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" name="password" class="form-control form-control-lg" placeholder="Nhập mật khẩu" required>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label small" for="remember">Ghi nhớ đăng nhập</label>
                                </div>
                                <a th:href="@{/forgot-password}" class="small text-decoration-none" style="color:var(--color-amber);">Quên mật khẩu?</a>
                            </div>
                            <button type="submit" class="btn w-100 btn-lg fw-semibold" style="background:var(--color-ocean);color:#fff;border-radius:var(--radius-sm);">Đăng nhập</button>
                        </form>
                        <hr class="my-4">
                        <div class="d-grid mb-4">
                            <a th:href="@{/oauth2/authorization/google}" class="btn btn-light border py-2 fw-semibold d-flex align-items-center justify-content-center" style="border-radius:var(--radius-sm);">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="20" class="me-2">
                                Đăng nhập bằng Google
                            </a>
                        </div>
                        <p class="text-center mb-0 small">Chưa có tài khoản? <a th:href="@{/register}" class="text-decoration-none fw-semibold" style="color:var(--color-amber);">Đăng ký ngay</a></p>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a th:href="@{/}" class="text-white text-decoration-none small opacity-75">← Quay về trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
