<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{client/fragments/head :: head('Liên hệ', null)}"></head>
<body>
<div th:replace="~{client/fragments/header :: header}"></div>
<div th:replace="~{client/fragments/navbar :: navbar}"></div>
<section class="page-header-luxe text-white text-center" style="padding:60px 0 55px;">
    <div class="container position-relative" style="z-index:1;">
        <h1 class="fw-bold display-5" style="color:#fff;">
            <i class="fa-solid fa-envelope-open-text me-2" style="color: var(--color-amber-light);"></i> Liên hệ
        </h1>
        <p class="lead" style="color:rgba(255,255,255,0.7);">Chúng tôi luôn sẵn sàng hỗ trợ bạn</p>
    </div>
</section>
<section class="py-5">
    <div class="container">
        <!-- Breadcrumb Navigation -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none" style="color:var(--color-ocean);"><i class="fa-solid fa-house me-1"></i> Trang chủ</a></li>
                <li class="breadcrumb-item active" aria-current="page">Liên hệ</li>
            </ol>
        </nav>

        <div class="row g-4">
            <div class="col-lg-4 reveal">
                <div class="glass-card p-4 h-100">
                    <h5 class="fw-bold mb-4" style="color:var(--color-ocean);">
                        <i class="fa-solid fa-phone-volume text-primary me-2"></i> Thông tin liên hệ
                    </h5>
                    <div class="mb-3">
                        <div class="fw-semibold">Hotline</div>
                        <a href="tel:19001234" class="text-decoration-none fs-5 fw-bold" style="color:var(--color-amber);">1900 1234</a>
                        <div class="small" style="color:var(--color-text-muted);">Hằng ngày 8:00 – 22:00</div>
                    </div>
                    <div class="mb-3">
                        <div class="fw-semibold">Email</div>
                        <a href="mailto:info@traveler.vn" class="text-decoration-none" style="color:var(--color-ocean);">info@traveler.vn</a>
                    </div>
                    <div class="mb-3">
                        <div class="fw-semibold">Địa chỉ</div>
                        <p class="mb-0" style="color:var(--color-text-muted);">123 Nguyễn Huệ, Quận 1, TP. Hồ Chí Minh</p>
                    </div>
                    <div>
                        <div class="fw-semibold mb-2">Mạng xã hội</div>
                        <div class="d-flex gap-2 flex-wrap">
                            <a href="#" class="btn btn-outline-primary btn-sm" style="border-color: #1877F2; color: #1877F2;">
                                <i class="fa-brands fa-facebook"></i> Facebook
                            </a>
                            <a href="#" class="btn btn-outline-danger btn-sm" style="border-color: #E1306C; color: #E1306C;">
                                <i class="fa-brands fa-instagram"></i> Instagram
                            </a>
                            <a href="#" class="btn btn-outline-info btn-sm" style="border-color: #0068FF; color: #0068FF;">
                                <i class="fa-solid fa-comments"></i> Zalo
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8 reveal reveal-delay-2">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-3" style="color:var(--color-ocean);">
                        <i class="fa-solid fa-paper-plane text-primary me-2"></i> Gửi tin nhắn
                    </h5>
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label fw-semibold">Họ tên</label><input type="text" class="form-control" placeholder="Nguyễn Văn A"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Email</label><input type="email" class="form-control" placeholder="email@example.com"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Điện thoại</label><input type="tel" class="form-control" placeholder="0912 345 678"></div>
                            <div class="col-md-6"><label class="form-label fw-semibold">Chủ đề</label>
                                <select class="form-select"><option>Tư vấn tour</option><option>Hỗ trợ đặt tour</option><option>Khiếu nại</option><option>Hợp tác</option><option>Khác</option></select>
                            </div>
                            <div class="col-12"><label class="form-label fw-semibold">Nội dung</label><textarea class="form-control" rows="5" placeholder="Nhập nội dung tin nhắn..."></textarea></div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-3 px-4">
                            <i class="fa-solid fa-paper-plane"></i> Gửi tin nhắn
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
<div th:replace="~{client/fragments/footer :: footer}"></div>
<script th:src="@{/js/homepage.js}"></script>
</body>
</html>
